<!doctype html>
<html lang="ar">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>تسجيل الدخول - شركة ليبيا للخدمات المالية</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="تطبيق الموظفين - لوحة تحكم شركة ليبيا للخدمات المالية" />
    <meta name="keywords" content="ليبيا المالية, موظفين, لوحة تحكم, تسجيل دخول" />
    <meta name="author" content="شركة ليبيا للخدمات المالية" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="language" content="Arabic" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    
    <!-- PWA Manifest - Login App (Separate) -->
    <link rel="manifest" href="/manifest-login.json" />
    <script>
      // Detect if loaded from manifest-login.json
      const params = new URLSearchParams(window.location.search);
      if (params.get('app') === 'staff-app') {
        // Ensure we stay on login page
        document.addEventListener('DOMContentLoaded', () => {
          // Override any navigation attempts
          window.addEventListener('popstate', (e) => {
            if (window.location.pathname !== '/login') {
              window.location.href = '/login?app=staff-app';
            }
          });
        });
      }
    </script>
    <meta name="theme-color" content="#1E2E3D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="تطبيق الموظفين" />
    <link rel="apple-touch-icon" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663215657361/hEaRsVNpcGRBTJiI.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663215657361/hEaRsVNpcGRBTJiI.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663215657361/hEaRsVNpcGRBTJiI.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    
    <!-- Service Worker Script for Login App -->
    <script>
      if ('serviceWorker' in navigator) {
        // Unregister all service workers first to clear cache
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(registration => {
            registration.unregister();
          });
        });
        
        // Register new service worker for login app
        navigator.serviceWorker.register('/sw-login.js', { scope: '/login' })
          .then(reg => console.log('Login app service worker registered'))
          .catch(err => console.log('Login app service worker registration failed:', err));
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
